<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Collector Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: auto;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            color: var(--accent);
            font-size: 1.5rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .video-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 250px;
            margin: 0 auto;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            user-select: none;
        }

        .btn:active { transform: scale(0.95); }
        .btn:hover { background-color: var(--accent-hover); }
        .btn.stop { background-color: var(--danger); grid-column: 2; grid-row: 2; }
        
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        .slider-group {
            margin-bottom: 15px;
        }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--danger);
            margin-right: 8px;
        }
        .status-indicator.connected { background-color: var(--success); }

        .btn-large {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
        }
        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--accent);
        }
        
        /* Auto-Train Banner */
        #training-banner {
            display: none;
            background-color: var(--warning);
            color: #000;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
        #notification-box {
            display: none;
            background-color: var(--success);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            animation: fadein 0.5s;
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            body { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="left-col">
        <div class="panel">
            <h2>Camera Feed</h2>
            <div class="video-container">
                <img src="/video_feed" alt="Live Stream">
            </div>
            
            <div id="training-banner">
                Model Compiling... <span id="train-prog">0</span>%
            </div>
            <div id="notification-box">
                Training completed! Model is ready.
            </div>
        </div>

        <div class="controls-grid">
            <div class="panel">
                <h2>Steering Control</h2>
                <div class="dpad">
                    <button class="btn" id="btn-up">W</button>
                    <button class="btn" id="btn-left">A</button>
                    <button class="btn stop" id="btn-stop">STOP</button>
                    <button class="btn" id="btn-right">D</button>
                    <button class="btn" id="btn-down">S</button>
                </div>
                <div style="margin-top: 15px; text-align: center;">
                    <label>Drive Speed: <span id="speed-val">180</span></label><br>
                    <input type="range" id="speed-slider" min="80" max="255" value="180" oninput="document.getElementById('speed-val').innerText = this.value">
                </div>
            </div>

            <div class="panel">
                <h2>Arm Override</h2>
                <div class="slider-group">
                    <label><span>Clamp (Servo)</span> <span id="clamp-val">10&deg;</span></label>
                    <input type="range" id="clamp" min="0" max="180" value="10" 
                           onchange="sendArmCmd('clamp', this.value)"
                           oninput="document.getElementById('clamp-val').innerText = this.value + '&deg;'">
                </div>
                <div class="slider-group">
                    <label>Base (Stepper)</label>
                    <div style="display:flex; gap:10px;">
                        <button class="btn" style="flex:1" onclick="sendArmCmd('base', -25)">Left</button>
                        <button class="btn" style="flex:1" onclick="sendArmCmd('base', 25)">Right</button>
                    </div>
                </div>
                <div class="slider-group">
                    <label>Joint (Stepper)</label>
                    <div style="display:flex; gap:10px;">
                        <button class="btn" style="flex:1" onclick="sendArmCmd('joint', -50)">Down</button>
                        <button class="btn" style="flex:1" onclick="sendArmCmd('joint', 50)">Up</button>
                    </div>
                </div>
                <div class="slider-group">
                    <label>Extension (Stepper)</label>
                    <div style="display:flex; gap:10px;">
                        <button class="btn" style="flex:1" onclick="sendArmCmd('ext', -50)">Retract</button>
                        <button class="btn" style="flex:1" onclick="sendArmCmd('ext', 50)">Extend</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="right-col">
        <div class="panel">
            <h2>Operation Sequence</h2>
            <button class="btn btn-large" id="btn-manual" onclick="setMode('manual')">Manual Mode</button>
            <button class="btn btn-large btn-outline" style="border-color: var(--warning); color: var(--warning);" id="btn-training" onclick="setMode('training')">
                Training Mode (Record Data)
            </button>
            <button class="btn btn-large btn-outline" id="btn-auto" onclick="setMode('autonomous')">Autonomous System</button>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <h2>System Diagnostics</h2>
            
            <p><span class="status-indicator" id="ind-car"></span> Driving Subsystem</p>
            <p><span class="status-indicator" id="ind-arm"></span> Utility Arm</p>
            <hr style="border-color: var(--border);">
            
            <p><strong>Current State:</strong> <span id="status-mode" style="text-transform: capitalize;">Manual</span></p>
            <p><strong>Arm Status:</strong> <span id="status-arm">Idle</span></p>
            
            <div style="margin-top:20px; padding:10px; background-color:#334155; border-radius:5px;">
                <p style="margin:0; font-size:0.9rem; color:#cbd5e1;">Target System:</p>
                <h3 id="target-id" style="margin:5px 0;">No Target</h3>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';

        const carMap = {
            'btn-up': 'forward',
            'btn-down': 'backward',
            'btn-left': 'left',
            'btn-right': 'right',
            'btn-stop': 'stop'
        };

        for (const [id, action] of Object.entries(carMap)) {
            const btn = document.getElementById(id);
            btn.addEventListener('mousedown', () => sendCarCmd(action));
            btn.addEventListener('mouseup', () => sendCarCmd('stop'));
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); sendCarCmd(action); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); sendCarCmd('stop'); });
        }

        document.addEventListener('keydown', (e) => {
            if(e.repeat) return;
            const key = e.key.toLowerCase();
            if(key === 'w') sendCarCmd('forward');
            if(key === 's') sendCarCmd('backward');
            if(key === 'a') sendCarCmd('left');
            if(key === 'd') sendCarCmd('right');
            if(key === ' ') sendCarCmd('stop');
        });

        document.addEventListener('keyup', (e) => {
            const keys = ['w','a','s','d'];
            if(keys.includes(e.key.toLowerCase())) sendCarCmd('stop');
        });

        async function sendCarCmd(action) {
            const speed = parseInt(document.getElementById('speed-slider').value);
            fetch(`${API_URL}/control/car`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, speed })
            }).catch(e => console.error(e));
        }

        async function sendArmCmd(motor, value) {
            fetch(`${API_URL}/control/arm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ motor, value: parseInt(value) })
            }).catch(e => console.error(e));
        }

        async function setMode(mode) {
            fetch(`${API_URL}/mode`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode })
            }).then(() => {
                const modes = ['manual', 'training', 'autonomous'];
                modes.forEach(m => {
                    let cls = 'btn btn-large';
                    if (m !== mode) {
                        cls += ' btn-outline';
                    }
                    if (m === 'training' && m !== mode) {
                        // preserve special coloring for inactive state
                        document.getElementById(`btn-${m}`).style.color = "var(--warning)";
                        document.getElementById(`btn-${m}`).style.borderColor = "var(--warning)";
                    } else if (m === 'training') {
                        document.getElementById(`btn-${m}`).style.color = "#000";
                        document.getElementById(`btn-${m}`).style.borderColor = "transparent";
                        document.getElementById(`btn-${m}`).style.backgroundColor = "var(--warning)";
                    }
                    
                    document.getElementById(`btn-${m}`).className = cls;
                });
            }).catch(e => console.error(e));
        }

        // Status Polling Loop
        setInterval(async () => {
            try {
                const res = await fetch(`${API_URL}/status`);
                const data = await res.json();
                
                document.getElementById('ind-car').className = `status-indicator ${data.car_connected ? 'connected' : ''}`;
                document.getElementById('ind-arm').className = `status-indicator ${data.arm_connected ? 'connected' : ''}`;
                
                document.getElementById('status-mode').innerText = data.mode;
                document.getElementById('status-arm').innerText = data.arm_busy ? 'Collecting Target...' : 'Idle';
                
                if (data.bin_detected) {
                    document.getElementById('target-id').innerText = `BIN LOCKED`;
                    document.getElementById('target-id').style.color = "var(--success)";
                } else {
                    document.getElementById('target-id').innerText = 'No Target';
                    document.getElementById('target-id').style.color = "inherit";
                }
                
                // Training Notifications
                const banner = document.getElementById('training-banner');
                const pbar = document.getElementById('train-prog');
                
                if (data.training_status === "training") {
                    banner.style.display = "block";
                    pbar.innerText = data.training_progress;
                } else {
                    banner.style.display = "none";
                }
                
                if (data.notification) {
                    const notifyBox = document.getElementById('notification-box');
                    notifyBox.style.display = 'block';
                    notifyBox.innerText = data.notification;
                    setTimeout(() => notifyBox.style.display = 'none', 8000);
                }
                
            } catch(e) { }
        }, 1000);

    </script>
</body>
</html>
